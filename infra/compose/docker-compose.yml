name: eventform

services:
  postgres:
    image: postgres:16-alpine
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: eventform
      POSTGRES_PASSWORD: eventform
      POSTGRES_DB: eventform
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U eventform -d eventform"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: kms
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - ./localstack/ready.d:/etc/localstack/init/ready.d:ro
      # dev-only key material, deliberately committed (prod: set KMS_KEY_MATERIAL_FILE to a host-generated file)
      - ${KMS_KEY_MATERIAL_FILE:-./localstack/dev-key-material.b64}:/etc/eventform/kms-key-material.b64:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "awslocal kms describe-key --key-id alias/eventform-endpoint-secrets --query KeyMetadata.KeyState --output text | grep -q Enabled"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_HEAP_OPTS: -Xmx256m -Xms128m
    ports:
      - "127.0.0.1:29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  connect:
    image: quay.io/debezium/connect:3.0
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: eventform-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KAFKA_HEAP_OPTS: -Xmx384m -Xms256m
    ports:
      - "127.0.0.1:8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/connectors > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  pgdata:
